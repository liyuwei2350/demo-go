name: Build and Push Docker Image

# 触发条件：当代码推送到 main 分支，或者在 main 分支创建 Pull Request 时触发
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    # 运行在最新的 Ubuntu 环境中
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库的代码
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 设置 Docker Buildx 环境（支持多平台构建和缓存等高级特性）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. 仅进行镜像构建验证
      - name: Build Docker Image
        run: |
          docker build -t nginx-auth:${{ github.sha }} .

      # ==============================================================
      # 以下部分为推送到镜像仓库（如 Docker Hub / 阿里云镜像等）的示例
      # 如果需要推送，请在 GitHub 仓库的 Settings -> Secrets 中配置
      # DOCKER_USERNAME 和 DOCKER_PASSWORD，然后取消下方注释即可
