name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check ACR Connectivity
        if: github.event_name == 'push'
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          echo "ACR_REGISTRY=${ACR_REGISTRY}"
          echo "${ACR_REGISTRY}" | sed -n 'l'
          nslookup "${ACR_REGISTRY}" || true
          curl -v --connect-timeout 10 --max-time 20 "https://${ACR_REGISTRY}/v2/" || true

      - name: Login to ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        env:
          DOCKER_CLIENT_TIMEOUT: "300"
          DOCKER_HTTP_TIMEOUT: "300"
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          logout: false

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        run: docker build -t nginx-auth:${{ github.sha }} .

      - name: Build and Push (ACR)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/nginx-auth:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/nginx-auth:${{ github.sha }}
